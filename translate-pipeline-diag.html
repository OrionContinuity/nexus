<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEXUS Translation Pipeline Diagnostic</title>
<style>
  body{background:#0a0a0a;color:#d4c8a5;font-family:monospace;font-size:13px;padding:14px;line-height:1.5;margin:0}
  h1{color:#c8a44e;font-size:15px;margin:0 0 8px}
  h2{color:#c8a44e;font-size:13px;margin:14px 0 4px;border-top:1px solid #2a2a2a;padding-top:10px}
  .ok{color:#4ade80}.bad{color:#ef4444}.warn{color:#fbbf24}.dim{color:#666}
  pre{background:#141414;padding:8px;border-radius:4px;white-space:pre-wrap;word-break:break-all;border:1px solid #2a2a2a;margin:4px 0;font-size:12px;max-height:300px;overflow:auto}
  button{background:#c8a44e;color:#0a0a0a;border:0;padding:10px 14px;border-radius:6px;font-weight:600;font-size:13px;margin:4px 4px 4px 0;cursor:pointer}
  button.alt{background:#2a2a2a;color:#d4c8a5;border:1px solid #444}
  .step{margin:6px 0}
  iframe{width:100%;height:200px;border:1px solid #444;border-radius:4px;background:#000;margin-top:8px}
  .input-row{margin:4px 0}
  input{background:#1a1a1a;color:#d4c8a5;border:1px solid #444;padding:6px 10px;border-radius:4px;width:100%;font-family:inherit;font-size:13px;box-sizing:border-box}
</style>
</head>
<body>
<h1>🔬 NEXUS Translation Pipeline Diagnostic</h1>
<p class="dim">Tests every stage of the translation pipeline against your live deployment.</p>

<button onclick="runFull()">🚀 Run All Tests</button>
<button class="alt" onclick="document.getElementById('out').innerHTML=''">Clear</button>

<pre id="out">Tap "Run All Tests" to begin.</pre>

<h2>Manual: Test specific text</h2>
<div class="input-row">
  <input id="customText" placeholder='Custom text to translate' value="Welcome to NEXUS, all equipment is current">
</div>
<button onclick="testCustom()">Translate Custom Text</button>

<script>
const SUPABASE_URL = 'https://oprsthfxqrdbwdvommpw.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_rOLSdIG6mIjVLY8JmvrwCA_qfM7Vyk9';
const out = document.getElementById('out');

function log(msg, cls) {
  out.innerHTML += `<span class="${cls||''}">${msg}</span>\n`;
  out.scrollTop = out.scrollHeight;
}

function clearOut() { out.innerHTML = ''; }

async function getAnonKey() {
  return SUPABASE_ANON_KEY;
}

async function runFull() {
  clearOut();
  log('━━━ STAGE 1: Edge function direct test ━━━', 'warn');

  const anonKey = await getAnonKey();
  if (!anonKey) { log('✗ Could not get anon key from config.js', 'bad'); return; }
  log('✓ Got anon key (' + anonKey.length + ' chars, prefix: ' + anonKey.slice(0, 20) + '...)', 'ok');

  // Test 1: Single text translation
  log('\nTest 1: Single string translation', 'warn');
  try {
    const r = await fetch(SUPABASE_URL + '/functions/v1/translate', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + anonKey,
        'apikey': anonKey,
      },
      body: JSON.stringify({ text: 'Welcome to NEXUS', target: 'es' })
    });
    const data = await r.json();
    log('  HTTP ' + r.status, r.ok ? 'ok' : 'bad');
    log('  Response: ' + JSON.stringify(data).slice(0, 300));
    if (data.translated) log('  ✓ Got translation: "' + data.translated + '"', 'ok');
  } catch(e) { log('  ✗ ' + e.message, 'bad'); }

  // Test 2: Batch translation (this is what NX.tr.batch uses)
  log('\nTest 2: Batch translation (texts: array)', 'warn');
  try {
    const r = await fetch(SUPABASE_URL + '/functions/v1/translate', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + anonKey,
        'apikey': anonKey,
      },
      body: JSON.stringify({
        texts: ['Welcome', 'Evening', 'All equipment is current', 'Nothing urgent this morning'],
        target: 'es'
      })
    });
    const data = await r.json();
    log('  HTTP ' + r.status, r.ok ? 'ok' : 'bad');
    log('  Response: ' + JSON.stringify(data).slice(0, 600));
    if (data.translations && Array.isArray(data.translations)) {
      log('  ✓ Got ' + data.translations.length + ' translations:', 'ok');
      data.translations.forEach((t, i) => log('    [' + i + '] ' + t));
    } else {
      log('  ✗ data.translations is missing or not an array', 'bad');
    }
  } catch(e) { log('  ✗ ' + e.message, 'bad'); }

  // Stage 2: Load translate.js + run NX.tr.batch as NEXUS would
  log('\n━━━ STAGE 2: NX.tr.batch via deployed translate.js ━━━', 'warn');

  // Load Supabase client + config
  log('Loading supabase client...');
  await new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
    s.onload = res;
    s.onerror = rej;
    document.head.appendChild(s);
  });
  log('  ✓ supabase client loaded', 'ok');

  window.NX = window.NX || {};
  window.NX.sb = window.supabase.createClient(SUPABASE_URL, anonKey);
  log('  ✓ NX.sb initialized', 'ok');

  log('Loading deployed translate.js...');
  const tjsRes = await fetch('https://orioncontinuity.github.io/nexus/js/translate.js?_=' + Date.now());
  const tjsCode = await tjsRes.text();
  try {
    eval(tjsCode);
    log('  ✓ translate.js loaded, NX.tr keys: ' + Object.keys(NX.tr).join(','), 'ok');
  } catch(e) {
    log('  ✗ translate.js threw: ' + e.message, 'bad'); return;
  }

  // Now call NX.tr.batch directly
  log('\nTest 3: NX.tr.batch(["Welcome", "Evening"], "es")', 'warn');
  try {
    const result = await NX.tr.batch(['Welcome', 'Evening', 'All equipment is current'], 'es');
    log('  Result: ' + JSON.stringify(result));
    if (Array.isArray(result) && result[0] !== 'Welcome') {
      log('  ✓ Translation succeeded', 'ok');
    } else {
      log('  ⚠ Result equals input — translation no-op or fallback', 'warn');
    }
  } catch(e) {
    log('  ✗ ' + e.message, 'bad');
  }

  // Stage 3: Test NX.tr.translatePage on a stub DOM
  log('\n━━━ STAGE 3: translatePage on DOM ━━━', 'warn');
  const testDom = document.createElement('div');
  testDom.id = 'tr-test-dom';
  testDom.innerHTML = `
    <h1>Evening, Alfredo.</h1>
    <p>All equipment is current and nothing new came in overnight.</p>
    <p>The restaurants are calm.</p>
  `;
  document.body.appendChild(testDom);
  log('Created test DOM with 3 strings');
  log('  Before: ' + testDom.querySelector('h1').textContent);

  try {
    await NX.tr.translatePage('es', { root: testDom });
    log('  After: ' + testDom.querySelector('h1').textContent);
    if (testDom.querySelector('h1').textContent.includes('Alfredo') && !testDom.querySelector('h1').textContent.startsWith('Evening')) {
      log('  ✓ DOM was translated', 'ok');
    } else {
      log('  ✗ DOM unchanged', 'bad');
    }
  } catch(e) {
    log('  ✗ translatePage threw: ' + e.message, 'bad');
    log('  Stack: ' + String(e.stack || '').slice(0, 400));
  }

  log('\n━━━ DONE ━━━', 'warn');
}

async function testCustom() {
  const text = document.getElementById('customText').value;
  if (!text) return;
  clearOut();
  log('Translating: "' + text + '" → es', 'warn');

  const anonKey = await getAnonKey();
  if (!anonKey) { log('✗ No anon key', 'bad'); return; }

  try {
    const r = await fetch(SUPABASE_URL + '/functions/v1/translate', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + anonKey,
        'apikey': anonKey,
      },
      body: JSON.stringify({ text, target: 'es' })
    });
    const data = await r.json();
    log('HTTP ' + r.status);
    log(JSON.stringify(data, null, 2));
  } catch(e) { log('✗ ' + e.message, 'bad'); }
}
</script>
</body>
</html>
