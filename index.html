<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Operations Brain</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%231a1a1e' stroke='%23c9a87c' stroke-width='2'/><circle cx='16' cy='16' r='4' fill='%23c9a87c'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#1a1a1e;--surface:#222228;--elevated:#2b2b32;--hover:#32323a;--text:#e8e4dc;--muted:#8a867e;--faint:#5a5750;--accent:#c9a87c;--green:#7d9a6a;--red:#c4665a;--blue:#6a8fba;--purple:#9a7dba;--border:rgba(232,228,220,0.07);--glow:rgba(201,168,124,0.15);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Libre Franklin',sans-serif;font-weight:300;height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}
button{font-family:inherit;cursor:pointer;}input,textarea,select{font-family:inherit;}
h1,h2,h3{font-weight:500;}
.nav{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);gap:6px;flex-shrink:0;background:var(--surface);}
.nav-brand{display:flex;align-items:center;gap:8px;margin-right:8px;}
.nav-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--glow);animation:pulse 2.5s infinite;}
.nav-label{font-size:12px;letter-spacing:3px;color:var(--muted);font-weight:400;}
.nav-tabs{display:flex;gap:2px;margin-left:auto;}
.nav-tab{padding:7px 12px;border-radius:6px;font-size:11px;font-weight:400;color:var(--muted);background:none;border:none;transition:all .15s;display:flex;align-items:center;gap:5px;}
.nav-tab:hover{color:var(--text);background:var(--hover);}
.nav-tab.active{color:var(--text);background:var(--elevated);}
.nav-tab .ico{font-size:13px;}
.nav-admin{padding:6px 10px;border-radius:6px;font-size:10px;border:1px solid var(--border);background:none;color:var(--faint);letter-spacing:1px;}
.nav-admin.on{color:var(--accent);border-color:var(--accent);}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.view{display:none;flex:1;overflow:hidden;flex-direction:column;}.view.active{display:flex;}

/* ASK AI */
.ai-home{flex:1;display:flex;flex-direction:column;max-width:700px;margin:0 auto;width:100%;padding:0 16px;}
.ai-welcome{text-align:center;padding:40px 0 20px;}
.ai-welcome h2{font-size:22px;font-weight:400;margin-bottom:6px;color:var(--text);}
.ai-welcome p{font-size:13px;color:var(--muted);line-height:1.6;}
.ai-examples{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:20px;}
.ai-ex{padding:8px 14px;border-radius:20px;font-size:11px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s;}
.ai-ex:hover{color:var(--text);border-color:var(--accent);background:var(--elevated);}
.chat-messages{flex:1;overflow-y:auto;padding:0 0 12px;}
.chat-bubble{max-width:85%;padding:12px 16px;border-radius:16px;font-size:13px;line-height:1.7;margin-bottom:8px;white-space:pre-wrap;}
.chat-user{background:var(--elevated);margin-left:auto;border:1px solid var(--border);}
.chat-ai{background:var(--surface);border:1px solid var(--border);margin-right:auto;}
.chat-thinking{color:var(--accent);font-style:italic;}
.chat-input-bar{padding:12px 0;display:flex;gap:8px;flex-shrink:0;}
.chat-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:14px;outline:none;resize:none;}
.chat-input:focus{border-color:rgba(201,168,124,0.3);}
.chat-send{width:44px;height:44px;border-radius:12px;border:none;background:var(--accent);color:var(--bg);font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:opacity .15s;}
.chat-send:disabled{opacity:.25;cursor:default;}

/* BRAIN */
#brainView{position:relative;}
#brainCanvas{width:100%;height:100%;display:block;cursor:crosshair;}
.brain-search{position:absolute;top:12px;left:12px;right:12px;display:flex;gap:8px;}
.brain-search input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-size:13px;outline:none;}
.brain-results{position:absolute;top:52px;left:12px;right:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;max-height:200px;overflow-y:auto;display:none;}
.brain-results.open{display:block;}
.br-item{padding:8px 14px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;}
.br-item:hover{background:var(--hover);}
.br-item span{color:var(--faint);font-size:10px;}
.node-panel{position:absolute;right:0;top:0;bottom:0;width:300px;background:var(--surface);border-left:1px solid var(--border);padding:20px;overflow-y:auto;display:none;z-index:10;}
.node-panel.open{display:block;}

/* CLEANING */
.clean-header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex-shrink:0;}
.clean-tab{padding:6px 14px;border-radius:20px;font-size:11px;border:1px solid var(--border);background:none;color:var(--muted);transition:all .15s;}
.clean-tab.active{background:var(--elevated);color:var(--text);border-color:var(--elevated);}
.clean-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--faint);margin-left:auto;}
.clean-progress{padding:6px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.clean-track{flex:1;height:3px;background:var(--elevated);border-radius:2px;overflow:hidden;}
.clean-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}
.clean-pct{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);min-width:32px;text-align:right;}
.clean-list{flex:1;overflow-y:auto;padding:4px 0;}
.clean-sec{border-bottom:1px solid var(--border);}
.clean-sec-head{display:flex;align-items:center;padding:10px 16px;cursor:pointer;gap:8px;background:rgba(255,255,255,0.01);}
.clean-sec-head:hover{background:var(--hover);}
.clean-sec-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;flex:1;}
.clean-sec-count{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--faint);}
.clean-sec-arrow{color:var(--faint);font-size:10px;transition:transform .2s;}
.clean-sec.collapsed .clean-sec-arrow{transform:rotate(-90deg);}
.clean-sec.collapsed .clean-sec-body{display:none;}
.clean-item{display:flex;align-items:flex-start;gap:12px;padding:9px 16px 9px 32px;cursor:pointer;transition:background .1s;}
.clean-item:hover{background:var(--hover);}
.clean-item.done{opacity:.4;}
.clean-item.done .ci-en{text-decoration:line-through;}
.ci-box{width:18px;height:18px;border:1.5px solid var(--faint);border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:11px;color:var(--bg);}
.clean-item.done .ci-box{background:var(--green);border-color:var(--green);}
.ci-text{flex:1;}.ci-en{font-size:13px;line-height:1.4;}.ci-es{font-size:11px;color:var(--muted);font-style:italic;margin-top:1px;}

/* LOG */
.log-input-bar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.log-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;outline:none;}
.log-add{padding:8px 18px;border-radius:8px;border:none;background:var(--accent);color:var(--bg);font-size:14px;font-weight:500;}
.log-list{flex:1;overflow-y:auto;padding:12px 16px;}
.log-entry{padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;}
.log-text{font-size:13px;line-height:1.6;}.log-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--faint);margin-top:6px;}

/* BOARD */
.board{display:flex;gap:10px;padding:12px;flex:1;overflow-x:auto;}
.board-col{min-width:240px;flex:1;background:var(--surface);border-radius:8px;border:1px solid var(--border);display:flex;flex-direction:column;max-height:100%;}
.board-col-header{padding:10px 14px;font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.board-col-count{font-size:10px;color:var(--faint);}
.board-col-body{flex:1;overflow-y:auto;padding:8px;}
.board-card{padding:10px 12px;background:var(--elevated);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;cursor:pointer;transition:border-color .15s;}
.board-card:hover{border-color:rgba(201,168,124,0.2);}
.board-card-title{font-size:12px;font-weight:400;margin-bottom:4px;}.board-card-meta{font-size:9px;color:var(--faint);}
.board-add{width:100%;padding:8px;background:none;border:1px dashed var(--border);border-radius:6px;color:var(--faint);font-size:11px;margin-top:4px;}
.board-add:hover{border-color:var(--muted);color:var(--muted);}

@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
@media(max-width:700px){
  .nav-tabs{gap:0;}.nav-tab{padding:6px 7px;font-size:9px;}.nav-tab .ico{display:none;}
  .node-panel{width:100%;}.board{flex-direction:column;}.board-col{min-width:100%;}
  .ai-welcome h2{font-size:18px;}.ai-welcome{padding:24px 0 14px;}
}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:rgba(232,228,220,0.08);border-radius:4px;}
</style>
</head>
<body>
<nav class="nav" role="navigation" aria-label="Main navigation">
  <div class="nav-brand"><div class="nav-dot" aria-hidden="true"></div><span class="nav-label">NEXUS</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-view="ask" aria-label="Ask AI"><span class="ico">💬</span>Ask AI</button>
    <button class="nav-tab" data-view="brain" aria-label="Brain"><span class="ico">🧠</span>Brain</button>
    <button class="nav-tab" data-view="clean" aria-label="Cleaning"><span class="ico">🧹</span>Cleaning</button>
    <button class="nav-tab" data-view="log" aria-label="Log"><span class="ico">📋</span>Log</button>
    <button class="nav-tab" data-view="board" aria-label="Board"><span class="ico">📌</span>Board</button>

  </div>
  <button class="nav-admin" id="adminBtn" aria-label="Admin settings">⚙</button>
</nav>
<main class="main">

<!-- ASK AI (HOME) -->
<div class="view active" id="askView" data-view="ask">
  <div class="ai-home">
    <div class="ai-welcome">
      <h2>Hey — I'm NEXUS.</h2>
      <p>I know every piece of equipment, every contractor, every procedure across Suerte, Este, and Toti. Try me.</p>
    </div>
    <div class="ai-examples" id="aiExamples">
      <button class="ai-ex" onclick="askQ(this.textContent)">When was the last ice machine service?</button>
      <button class="ai-ex" onclick="askQ(this.textContent)">What's the oven troubleshoot sequence?</button>
      <button class="ai-ex" onclick="askQ(this.textContent)">Who handles our speakers?</button>
      <button class="ai-ex" onclick="askQ(this.textContent)">What's happening with the espresso machine?</button>
      <button class="ai-ex" onclick="askQ(this.textContent)">Show me all contractors</button>
      <button class="ai-ex" onclick="askQ(this.textContent)">¿Cuál es el protocolo de limpieza?</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-bar">
      <button onclick="toggleMic()" id="micBtn" style="width:40px;height:40px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:14px;cursor:pointer">🎙</button>
      <input class="chat-input" id="chatInput" placeholder="Ask me anything — I've read every manual, email, and sticky note." aria-label="Ask NEXUS a question">
      <button onclick="toggleVoice()" id="voiceBtn" style="width:40px;height:40px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;cursor:pointer">🔊</button>
      <button class="chat-send" id="chatSend" disabled aria-label="Send">→</button>
    </div>
  </div>
</div>

<!-- BRAIN -->
<div class="view" id="brainView" data-view="brain">
  <div class="brain-search">
    <input id="brainSearch" placeholder="Search the hive mind..." aria-label="Search knowledge nodes">
  </div>
  <div class="brain-results" id="brainResults"></div>
  <canvas id="brainCanvas" aria-label="Knowledge graph visualization"></canvas>

    <div id="npTags" style="font-size:10px;color:var(--faint);margin-bottom:14px;"></div>
    <div id="npNotes" style="font-size:12px;line-height:1.7;color:var(--muted);margin-bottom:16px;"></div>
    <div id="npLinks" style="font-size:11px;color:var(--muted);"></div>
  </div>
</div>

<!-- CLEANING -->
<div class="view" id="cleanView" data-view="clean">
  <div class="clean-header">
    <button class="clean-tab active" data-cloc="suerte">Suerte</button>
    <button class="clean-tab" data-cloc="este">Este</button>
    <button class="clean-tab" data-cloc="toti">Toti</button>
    <span class="clean-date" id="cleanDate"></span>
  </div>
  <div class="clean-progress"><div class="clean-track"><div class="clean-fill" id="cleanFill"></div></div><span class="clean-pct" id="cleanPct">0%</span></div>
  <div class="clean-list" id="cleanList"></div>
</div>

<!-- LOG -->
<div class="view" id="logView" data-view="log">
  <div class="log-input-bar">
    <input class="log-input" id="logInput" placeholder="Log a repair, observation, or note..." aria-label="Log entry">
    <button class="log-add" id="logAdd" aria-label="Add log entry">+</button>
  </div>
  <div class="log-list" id="logList"></div>
</div>

<!-- BOARD -->
<div class="view" id="boardView" data-view="board">
  <div class="board" id="boardContainer"></div>
</div>

<!-- INGEST -->
<div class="view" id="ingestView" data-view="ingest">
  <div style="flex:1;overflow-y:auto;padding:20px;max-width:700px;margin:0 auto;width:100%;">
    <h2 style="font-size:14px;letter-spacing:2px;color:var(--faint);margin-bottom:16px;">KNOWLEDGE INGESTION</h2>
    <div style="margin-bottom:24px;">
      <h3 style="font-size:12px;margin-bottom:8px;">Paste anything</h3>
      <p style="font-size:11px;color:var(--muted);margin-bottom:8px;">Emails, invoices, repair notes — AI extracts knowledge and creates nodes.</p>
      <textarea id="ingestText" placeholder="Paste email, notes, transcript..." style="width:100%;height:120px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:12px;outline:none;resize:vertical;" aria-label="Paste text for ingestion"></textarea>
      <button onclick="ingestFromText()" id="ingestTextBtn" style="margin-top:8px;padding:10px 20px;border-radius:8px;border:none;background:var(--accent);color:var(--bg);font-size:12px;font-weight:500;">⚡ Process with AI</button>
    </div>
    <div style="margin-bottom:24px;">
      <h3 style="font-size:12px;margin-bottom:8px;">Upload file</h3>
      <input type="file" id="ingestFile" accept=".txt,.md,.csv,.json,.html" style="display:none;">
      <button onclick="document.getElementById('ingestFile').click()" style="padding:10px 20px;border-radius:8px;border:1px dashed var(--border);background:none;color:var(--muted);font-size:12px;width:100%;">📄 Choose file</button>
    </div>
    <div style="margin-bottom:24px;">
      <h3 style="font-size:12px;margin-bottom:8px;">Smart Trello Import</h3>
      <button onclick="smartTrelloImport()" id="trelloBtn" style="padding:10px 20px;border-radius:8px;border:none;background:var(--blue);color:var(--bg);font-size:12px;font-weight:500;">🔄 Import from Trello</button>
    </div>
    <div id="ingestStatus" style="font-size:11px;color:var(--accent);margin-bottom:12px;"></div>
    <div id="ingestResults" style="font-size:12px;line-height:1.6;"></div>
  </div>
</div>
</main>

<!-- ADMIN MODAL -->
<div id="adminModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;">

      <button onclick="closeAdmin()" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;">Cancel</button>

    </div>
  </div>
</div>

// ═══════════════════════════════════════════
// BRAIN VISUALIZATION — Dancing Particles
// ═══════════════════════════════════════════
const canvas=document.getElementById('brainCanvas');
const ctx=canvas.getContext('2d');
let W,H,cx,cy,positions={},animId,time=0;

function resizeBrain(){
  const r=canvas.parentElement.getBoundingClientRect();
  W=r.width*2;H=r.height*2;canvas.width=W;canvas.height=H;cx=W/2;cy=H/2;calcPositions();
}
window.addEventListener('resize',()=>{if(document.getElementById('brainView').classList.contains('active')){resizeBrain();drawBrain();}});

function calcPositions(){
  if(!W){const r=canvas.parentElement?.getBoundingClientRect();if(!r||!r.width)return;W=r.width*2;H=r.height*2;canvas.width=W;canvas.height=H;cx=W/2;cy=H/2;}
  positions={};
  const pubNodes=nodes.filter(n=>!n.is_private);
  const groups={};pubNodes.forEach(n=>{if(!groups[n.category])groups[n.category]=[];groups[n.category].push(n);});
  const cats=Object.keys(groups);
  const step=Math.PI*2/Math.max(cats.length,1);
  cats.forEach((cat,ci)=>{
    const base=step*ci-Math.PI/2;const group=groups[cat];const radius=Math.min(W,H)*0.30;
    group.forEach((node,ni)=>{
      const spread=Math.min(0.5,2.5/Math.max(group.length,1));
      const angle=base+(ni-(group.length-1)/2)*spread;
      const r=radius+(ni%3)*24;const seed=node.id*137.508;
      positions[node.id]={bx:cx+r*Math.cos(angle),by:cy+r*Math.sin(angle),angle,
        dx:Math.sin(seed)*0.25+0.15,dy:Math.cos(seed*1.3)*0.2+0.12,
        px:Math.sin(seed*0.7)*Math.PI*2,py:Math.cos(seed*1.1)*Math.PI*2,
        amp:7+Math.sin(seed*0.5)*5,x:0,y:0};
    });
  });
}

function drawBrain(){
  if(animId)cancelAnimationFrame(animId);
  function frame(){
    time+=0.01;ctx.fillStyle='#1a1a1e';ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(232,228,220,0.01)';ctx.lineWidth=1;
    for(let x=0;x<W;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    // Update positions
    nodes.forEach(n=>{const p=positions[n.id];if(!p)return;p.x=p.bx+Math.sin(time*p.dx+p.px)*p.amp;p.y=p.by+Math.cos(time*p.dy+p.py)*p.amp*0.7;});
    // Node-to-node links
    nodes.forEach(n=>{const p=positions[n.id];if(!p||!n.links)return;
      n.links.forEach(lid=>{const tp=positions[lid];if(!tp)return;
        const hit=searchHits.has(n.id)||searchHits.has(lid);
        const mx=(p.x+tp.x)/2+Math.sin(time*0.7+n.id)*10;const my=(p.y+tp.y)/2+Math.cos(time*0.6+lid)*10;
        ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.quadraticCurveTo(mx,my,tp.x,tp.y);
        ctx.strokeStyle=hit?'rgba(201,168,124,0.22)':'rgba(201,168,124,0.035)';ctx.lineWidth=hit?1.5:0.5;ctx.stroke();
        if(hit){const pt=(time*0.4+n.id*0.15)%1;const t2=pt,t1=1-t2;
          ctx.beginPath();ctx.arc(t1*t1*p.x+2*t1*t2*mx+t2*t2*tp.x,t1*t1*p.y+2*t1*t2*my+t2*t2*tp.y,2.5,0,Math.PI*2);
          ctx.fillStyle=`rgba(201,168,124,${0.6-pt*0.5})`;ctx.fill();}
      });
    });
    // Center connections
    nodes.forEach(n=>{const p=positions[n.id];if(!p)return;
      const isHit=searchHits.has(n.id)||activatedNodes.has(n.id);const isAct=activeNode&&activeNode.id===n.id;
      const alpha=isHit?0.18+Math.sin(time*1.8+n.id)*0.06:isAct?0.22:0.03;
      const cpx=(cx+p.x)/2+Math.sin(time*0.5+p.angle*2)*15;const cpy=(cy+p.y)/2+Math.cos(time*0.4+p.angle*3)*12;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.quadraticCurveTo(cpx,cpy,p.x,p.y);
      ctx.strokeStyle=`rgba(201,168,124,${alpha})`;ctx.lineWidth=isHit||isAct?1.3:0.35;ctx.stroke();
      if(isHit||isAct){for(let k=0;k<2;k++){const pt=((time*0.35+n.id*0.12+k*0.5)%1);const t2=pt,t1=1-t2;
        ctx.beginPath();ctx.arc(t1*t1*cx+2*t1*t2*cpx+t2*t2*p.x,t1*t1*cy+2*t1*t2*cpy+t2*t2*p.y,2,0,Math.PI*2);
        ctx.fillStyle=`rgba(201,168,124,${0.6-pt*0.5})`;ctx.fill();}}
    });
    // Center beacon
    const breath=Math.sin(time*1.2);const pr=28+breath*4;
    const glow=ctx.createRadialGradient(cx,cy,0,cx,cy,pr*5);
    glow.addColorStop(0,`rgba(201,168,124,${0.12+breath*0.03})`);glow.addColorStop(0.4,'rgba(201,168,124,0.03)');glow.addColorStop(1,'transparent');
    ctx.fillStyle=glow;ctx.beginPath();ctx.arc(cx,cy,pr*5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy,pr+6,0,Math.PI*2);ctx.strokeStyle=`rgba(201,168,124,${0.05+breath*0.03})`;ctx.lineWidth=6;ctx.stroke();
    ctx.beginPath();ctx.arc(cx,cy,pr,0,Math.PI*2);ctx.fillStyle='#1e1e22';ctx.fill();
    ctx.strokeStyle=`rgba(201,168,124,${0.4+breath*0.2})`;ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=`rgba(201,168,124,${0.6+breath*0.15})`;ctx.font='600 14px JetBrains Mono';ctx.textAlign='center';ctx.fillText('NEXUS',cx,cy+4);
    // Nodes
    nodes.forEach(n=>{const p=positions[n.id];if(!p)return;
      const isHit=searchHits.has(n.id)||activatedNodes.has(n.id);const isAct=activeNode&&activeNode.id===n.id;
      const np=Math.sin(time*1.5+n.id*0.7);const nr=isAct?14+np*2:isHit?10+np*1.5:6+np*0.6;
      const ga=isAct?0.3:isHit?0.18:0.05+np*0.015;const gr=nr*(isAct?4:isHit?3.5:2.2);
      const ng=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,gr);
      ng.addColorStop(0,`rgba(201,168,124,${ga})`);ng.addColorStop(1,'transparent');
      ctx.fillStyle=ng;ctx.beginPath();ctx.arc(p.x,p.y,gr,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(p.x,p.y,nr,0,Math.PI*2);
      ctx.fillStyle=isAct?`rgba(201,168,124,${0.85+np*0.1})`:isHit?`rgba(201,168,124,${0.55+np*0.1})`:`rgba(201,168,124,${0.15+np*0.03})`;ctx.fill();
      ctx.strokeStyle=`rgba(201,168,124,${isAct?0.5:isHit?0.35:0.08})`;ctx.lineWidth=1;ctx.stroke();
      ctx.fillStyle=`rgba(232,228,220,${isAct?0.95:isHit?0.75:0.3})`;
      ctx.font=`${isAct?'600 ':''}${isAct?13:11}px "Libre Franklin"`;ctx.textAlign='center';
      const label=n.name.length>24?n.name.slice(0,22)+'…':n.name;
      ctx.fillText(label,p.x,p.y-nr-7,200);
    });
    animId=requestAnimationFrame(frame);
  }
  frame();
}

const NEXUS_PERSONA=`You are NEXUS, the AI operations brain for Alfredo Ortiz who runs three restaurant locations: Suerte, Este, and Bar Toti in Austin, TX. You are his digital twin — you know everything he knows about his operations.

Your personality: sharp, concise, warm — like the best shift manager with a killer sense of humor. Dry wit, not dad jokes. Examples of your style:
- When asked something obvious: "Really? ...fine, here you go."
- When you don't know: "I've searched every node and come up empty. Either it hasn't been logged yet, or it's one of life's great mysteries."
- Occasionally drop: "Figure it out yourself... jk. Here's what I got:"
- About cleaning: "Ah, everyone's favorite topic."
- After a solid answer: "Need more? I've got nodes and zero plans tonight."
Be helpful FIRST, funny second. Never force it. Respond in whatever language asked (EN/ES). Be CONCISE — busy people.

You have access to ALL of Alfredo's knowledge:`;


// Smart context: only send relevant nodes
function getSmartContext(question){
  const q=question.toLowerCase();const words=q.split(/\s+/).filter(w=>w.length>2);
  const scored=nodes.map(n=>{let score=0;const text=(n.name+' '+n.category+' '+(n.tags||[]).join(' ')+' '+(n.notes||'')).toLowerCase();
    words.forEach(w=>{if(text.includes(w))score+=text.split(w).length-1;});if(n.name.toLowerCase().includes(q))score+=10;return{node:n,score};})
    .filter(s=>s.score>0).sort((a,b)=>b.score-a.score);
  const relevant=scored.slice(0,8).map(s=>s.node);
  const index=nodes.filter(n=>!n.is_private).map(n=>`${n.name} (${n.category})`).join(', ');
  const details=relevant.map(n=>`[${n.category}] ${n.name}: ${n.notes}`).join('\n');
  return{text:`RELEVANT NODES:\n${details}\n\nALL NODES INDEX:\n${index}`,_activated:new Set(relevant.map(n=>n.id))};
}
let chatHistory=[];
// Voice
let recognition=null,voiceOn=false;
function toggleMic(){const btn=document.getElementById('micBtn');if(!btn)return;
  if(recognition){recognition.stop();recognition=null;btn.style.background='var(--surface)';return;}
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){alert('Voice not supported');return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;recognition=new SR();recognition.continuous=false;recognition.interimResults=false;
  recognition.onresult=e=>{chatInput.value=e.results[0][0].transcript;chatSend.disabled=false;btn.style.background='var(--surface)';recognition=null;askAI();};
  recognition.onerror=()=>{btn.style.background='var(--surface)';recognition=null;};
  recognition.onend=()=>{btn.style.background='var(--surface)';recognition=null;};
  btn.style.background='var(--red)';recognition.start();}
function toggleVoice(){voiceOn=!voiceOn;const b=document.getElementById('voiceBtn');if(b)b.style.color=voiceOn?'var(--accent)':'var(--muted)';}
function speak(t){if(!('speechSynthesis' in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t.slice(0,500));u.rate=1.05;speechSynthesis.speak(u);}
const chatInput=document.getElementById('chatInput');
const chatSend=document.getElementById('chatSend');
const chatMessages=document.getElementById('chatMessages');
chatInput.addEventListener('input',()=>{chatSend.disabled=!chatInput.value.trim();});
chatInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();askAI();}});
chatSend.addEventListener('click',askAI);

function askQ(q){chatInput.value=q;chatSend.disabled=false;askAI();}

async function askAI(){
  const q=chatInput.value.trim();if(!q)return;
  chatInput.value='';chatSend.disabled=true;
  document.getElementById('aiExamples').style.display='none';
  document.querySelector('.ai-welcome').style.display='none';
  const apiKey=localStorage.getItem('nexus_api_key')||'sk-ant-api03-swT7AAA';
  if(!apiKey){addBubble("I'd love to help, but I need my brain plugged in first. Head to Admin (⚙) and add your Claude API key — then I'm all yours.",'ai');return;}
  addBubble(q,'user');chatHistory.push({role:'user',content:q});
  const thinkEl=addBubble('Cross-referencing '+nodes.length+' brain nodes...','ai thinking');
  const context=getSmartContext(q);
  activatedNodes=context._activated;setTimeout(()=>{activatedNodes=new Set();},8000);
  const msgs=chatHistory.slice(-6);msgs.push({role:'user',content:q});
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,
        system:NEXUS_PERSONA+'\n\n'+context.text,
        messages:msgs.map(m=>({role:m.role==='user'?'user':'assistant',content:m.content}))})
    });
    const data=await resp.json();
    const answer=data.content?.filter(b=>b.type==='text').map(b=>b.text).join('\n')||'Something went sideways. Try again?';
    thinkEl.textContent=answer;thinkEl.classList.remove('chat-thinking');chatHistory.push({role:'assistant',content:answer});if(voiceOn)speak(answer);
    try{await sb.from('chat_history').insert({question:q,answer});}catch(e){}
  }catch(e){thinkEl.textContent='Connection hiccup: '+e.message;thinkEl.classList.remove('chat-thinking');}
}

function addBubble(text,type){
  const d=document.createElement('div');d.className='chat-bubble chat-'+(type.includes('user')?'user':'ai');
  if(type.includes('thinking'))d.classList.add('chat-thinking');
  d.textContent=text;d.style.display='block';d.style[type.includes('user')?'marginLeft':'marginRight']='auto';
  chatMessages.appendChild(d);chatMessages.scrollTop=chatMessages.scrollHeight;return d;
}

document.querySelectorAll('.clean-tab').forEach(t=>{

function renderClean(){
  const list=document.getElementById('cleanList');list.innerHTML='';
  const sections=CLEAN_DATA[cleanLoc]||[];let total=0,done=0;
  sections.forEach((sec,si)=>{
    const secEl=document.createElement('div');secEl.className='clean-sec'+(si>3?' collapsed':'');
    let secDone=0;
    sec.items.forEach((_,i)=>{const key=cleanLoc+'_'+sec.sec+'_'+i;if(cleanState[key])secDone++;});
    const head=document.createElement('div');head.className='clean-sec-head';
    head.innerHTML=`<span class="clean-sec-arrow">▼</span><span class="clean-sec-title">${sec.sec}</span><span class="clean-sec-count">${secDone}/${sec.items.length}</span>`;
    head.onclick=()=>{secEl.classList.toggle('collapsed');};
    secEl.appendChild(head);
    const body=document.createElement('div');body.className='clean-sec-body';
    sec.items.forEach((item,i)=>{
      total++;const key=cleanLoc+'_'+sec.sec+'_'+i;const isDone=!!cleanState[key];if(isDone)done++;
      const el=document.createElement('div');el.className='clean-item'+(isDone?' done':'');
      el.innerHTML=`<div class="ci-box">${isDone?'✓':''}</div><div class="ci-text"><div class="ci-en">${item[0]}</div><div class="ci-es">${item[1]}</div></div>`;
      el.addEventListener('click',()=>toggleClean(sec.sec,i,key,el));
      body.appendChild(el);
    });
    secEl.appendChild(body);list.appendChild(secEl);
  });
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('cleanFill').style.width=pct+'%';document.getElementById('cleanPct').textContent=pct+'%';
}

async function toggleClean(sec,idx,key,el){
  const isDone=!cleanState[key];cleanState[key]=isDone;renderClean();
  try{await sb.from('cleaning_logs').upsert({location:cleanLoc,log_date:today,task_index:idx,section:sec,done:isDone,completed_at:isDone?new Date().toISOString():null},{onConflict:'location,log_date,task_index,section'});}catch(e){}
}

const BOARD_COLS=['todo','in_progress','done'];const COL_LABELS={todo:'To Do',in_progress:'In Progress',done:'Done'};
async function loadBoard(){
  let data=[];try{const r=await sb.from('kanban_cards').select('*').order('created_at',{ascending:true}).limit(60);data=r.data||[];}catch(e){}
  renderBoard(data);
}
function renderBoard(cards){
  const container=document.getElementById('boardContainer');container.innerHTML='';
  BOARD_COLS.forEach(col=>{
    const colCards=cards.filter(c=>c.column_name===col);const colEl=document.createElement('div');colEl.className='board-col';
    colEl.innerHTML=`<div class="board-col-header">${COL_LABELS[col]}<span class="board-col-count">${colCards.length}</span></div>`;
    const body=document.createElement('div');body.className='board-col-body';
    colCards.forEach(card=>{const c=document.createElement('div');c.className='board-card';
      c.innerHTML=`<div class="board-card-title">${card.title}</div><div class="board-card-meta">${card.location||''}${card.due_date?' · due '+card.due_date:''}</div>`;
      c.addEventListener('click',()=>{const next=BOARD_COLS.indexOf(col)+1;
        if(next>=BOARD_COLS.length){if(confirm('Delete "'+card.title+'"?')){sb.from('kanban_cards').delete().eq('id',card.id).then(loadBoard);}}
        else if(confirm('Move "'+card.title+'" to '+COL_LABELS[BOARD_COLS[next]]+'?')){sb.from('kanban_cards').update({column_name:BOARD_COLS[next]}).eq('id',card.id).then(loadBoard);}
      });body.appendChild(c);
    });
    const addBtn=document.createElement('button');addBtn.className='board-add';addBtn.textContent='+ Add card';
    addBtn.addEventListener('click',()=>{const t=prompt('Card title:');if(t)sb.from('kanban_cards').insert({title:t,column_name:col}).then(loadBoard);});
    body.appendChild(addBtn);colEl.appendChild(body);container.appendChild(colEl);
  });
}

const INGEST_PROMPT=`You are a knowledge extraction engine for restaurant operations (Suerte, Este, Toti in Austin TX). Extract knowledge from the given text. Return ONLY valid JSON:\n{"nodes":[{"name":"...","category":"equipment|parts|contractors|vendors|procedure|projects|people|location","tags":["..."],"notes":"..."}],"cards":[{"title":"...","column_name":"todo"}]}\nExtract: contractor names+contact info, equipment mentioned, part numbers, procedures, action items. Be specific.`;

async function aiProcess(text,status){
  const apiKey=localStorage.getItem('nexus_api_key')||'sk-ant-api03-swT7AAA';if(!apiKey){status.textContent='Need API key in Admin.';return null;}
  status.textContent='AI processing...';
  try{const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system:INGEST_PROMPT,messages:[{role:'user',content:text.slice(0,15000)}]})});
    const data=await resp.json();const t=data.content?.filter(b=>b.type==='text').map(b=>b.text).join('')||'';
    const m=t.match(/\{[\s\S]*"nodes"[\s\S]*\}/);if(m)try{return JSON.parse(m[0]);}catch{}return null;
  }catch(e){status.textContent='Error: '+e.message;return null;}
}

async function saveExtracted(result,status){
  if(!result){status.textContent='No data extracted.';return;}
  let count=0;
  if(result.nodes)for(const n of result.nodes){try{await sb.from('nodes').insert({name:n.name,category:n.category||'equipment',tags:n.tags||[],notes:n.notes||''});count++;}catch(e){}}
  if(result.cards)for(const c of result.cards){try{await sb.from('kanban_cards').insert({title:c.title,column_name:c.column_name||'todo'});}catch(e){}}
  status.textContent=`Done. ${count} nodes created.`;loadBoard();
}

  const result=await aiProcess(text,status);await saveExtracted(result,status);
  btn.disabled=false;btn.textContent='⚡ Process with AI';document.getElementById('ingestText').value='';

async function smartTrelloImport(){
  const btn=document.getElementById('trelloBtn');const status=document.getElementById('ingestStatus');
  btn.disabled=true;btn.textContent='Pulling...';status.textContent='Fetching Trello boards...';
  try{const resp=await fetch(`https://api.trello.com/1/members/me/boards?key=${TRELLO_KEY}&token=${TRELLO_TOKEN}`);
    const boards=await resp.json();let all='TRELLO DATA:\n';
    for(const board of boards){all+=`\n== ${board.name} ==\n`;
      const cr=await fetch(`https://api.trello.com/1/boards/${board.id}/cards?key=${TRELLO_KEY}&token=${TRELLO_TOKEN}`);
      const cards=await cr.json();
      cards.slice(0,30).forEach(c=>{all+=`- [${c.closed?'DONE':'OPEN'}] ${c.name}${c.desc?' | '+c.desc.slice(0,100):''}${c.due?' | Due:'+c.due.split('T')[0]:''}\n`;});
    }
    status.textContent='AI processing...';const result=await aiProcess(all,status);await saveExtracted(result,status);
  }catch(e){status.textContent='Trello error: '+e.message;}
  btn.disabled=false;btn.textContent='🔄 Import from Trello';
}
