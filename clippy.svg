    <path class="cl-mouth-cat" d="M 92 130 Q 96 134 100 130 Q 104 134 108 130" stroke="#04124a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <ellipse class="cl-mouth-kiss" cx="100" cy="132" rx="3.2" ry="2.4" fill="#ff5577"/>
  </g>

  <g class="cl-zzz">
    <text x="146" y="50" font-family="serif" font-size="14" font-weight="700" fill="#7df0ff" opacity="0.85">z</text>
    <text x="156" y="38" font-family="serif" font-size="16" font-weight="700" fill="#9bf2ff" opacity="0.85">z</text>
    <text x="168" y="24" font-family="serif" font-size="18" font-weight="700" fill="#bef5ff" opacity="0.85">Z</text>
  </g>

  <!-- v17.4: NODES render LAST so they orbit OVER the character.
       Bigger (r=6-8), softer pastel colors, no glow filter (flat 2D).
       Mix of outer-ring positions (orbit around, never block face) and
       inner-ring positions (orbit visibly over the body). -->
  <g class="cl-nodes">
    <circle class="cl-node cl-node-1" cx="172" cy="62"  r="7"   fill="#9adff5"/>
    <circle class="cl-node cl-node-2" cx="178" cy="130" r="6.5" fill="#cbb0f5"/>
    <circle class="cl-node cl-node-3" cx="128" cy="178" r="6"   fill="#9adff5"/>
    <circle class="cl-node cl-node-4" cx="28"  cy="158" r="7"   fill="#9adff5"/>
    <circle class="cl-node cl-node-5" cx="32"  cy="65"  r="6.5" fill="#cbb0f5"/>
    <circle class="cl-node cl-node-6" cx="135" cy="58"  r="5.5" fill="#9adff5"/>
    <circle class="cl-node cl-node-7" cx="62"  cy="138" r="5.5" fill="#cbb0f5"/>
  </g>
  </g>
</svg>
