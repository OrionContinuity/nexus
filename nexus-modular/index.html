<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23121214' stroke='%23c9a87c' stroke-width='2'/><circle cx='16' cy='16' r='4' fill='%23c9a87c'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/nexus.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- NAVIGATION -->
<nav class="nav" role="navigation" aria-label="Main navigation">
  <div class="nav-brand">
    <div class="nav-dot" aria-hidden="true"></div>
    <span class="nav-label">NEXUS</span>
  </div>
  <div class="nav-tabs" id="navTabs">
    <button class="nav-tab active" data-view="brain" aria-label="Brain & AI">Brain</button>
    <button class="nav-tab" data-view="clean" aria-label="Cleaning checklists">Cleaning</button>
    <button class="nav-tab" data-view="log" aria-label="Daily log">Log</button>
    <button class="nav-tab" data-view="board" aria-label="Task board">Board</button>
    <button class="nav-tab" data-view="ingest" id="ingestTab" style="display:none;color:var(--accent)" aria-label="Ingest">⚡Ingest</button>
  </div>
  <button class="nav-admin" id="adminBtn" aria-label="Admin settings">⚙</button>
</nav>

<!-- MAIN CONTAINER -->
<main class="main" id="mainContainer">

  <!-- BRAIN + AI (default, always loaded) -->
  <div class="view active" id="brainView" data-view="brain">
    <canvas id="brainCanvas" aria-label="Knowledge graph"></canvas>
    <div class="brain-dim" id="brainDim"></div>
    <div class="brain-overlay">
      <div class="brain-search">
        <input id="brainSearch" placeholder="Search the hive mind..." aria-label="Search nodes">
        <button class="list-toggle" id="listToggle" aria-label="Toggle list view">☰</button>
      </div>
      <div class="search-results" id="searchResults"></div>
      <div class="list-view" id="listView"></div>
      <div class="brain-welcome" id="brainWelcome">
        <h2>Hey — I'm NEXUS.</h2>
        <p>I know every manual, email, and sticky note. Try me.</p>
      </div>
      <div class="brain-examples" id="brainExamples">
        <button class="brain-ex">When was the last ice machine service?</button>
        <button class="brain-ex">What's the oven troubleshoot sequence?</button>
        <button class="brain-ex">Who handles our speakers?</button>
        <button class="brain-ex">Espresso machine status?</button>
        <button class="brain-ex">Show me all contractors</button>
        <button class="brain-ex">¿Cuál es el protocolo de limpieza?</button>
      </div>
      <div class="brain-chat" id="chatMessages"></div>
      <div class="brain-input">
        <button class="btn-mic" id="micBtn" aria-label="Voice input">🎙</button>
        <input id="chatInput" placeholder="Ask me anything..." aria-label="Ask NEXUS">
        <button class="btn-voice" id="voiceBtn" aria-label="Read aloud toggle">🔊</button>
        <button class="btn-send" id="chatSend" disabled aria-label="Send">→</button>
      </div>
    </div>
    <div class="node-panel" id="nodePanel">
      <button onclick="NX.brain.closePanel()" style="position:absolute;top:10px;right:10px;background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer" aria-label="Close">✕</button>
      <div id="npCat" style="font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px"></div>
      <h3 id="npName" style="font-size:16px;font-weight:500;margin-bottom:6px"></h3>
      <div id="npTags" style="font-size:9px;color:var(--faint);margin-bottom:12px"></div>
      <div id="npNotes" style="font-size:11px;line-height:1.7;color:var(--muted);margin-bottom:14px"></div>
      <div id="npLinks" style="font-size:10px"></div>
    </div>
  </div>

  <!-- CLEANING (lazy) -->
  <div class="view" id="cleanView" data-view="clean">
    <div class="clean-header">
      <button class="clean-tab active" data-cloc="suerte">Suerte</button>
      <button class="clean-tab" data-cloc="este">Este</button>
      <button class="clean-tab" data-cloc="toti">Toti</button>
      <span class="clean-date" id="cleanDate"></span>
    </div>
    <div class="clean-progress">
      <div class="clean-track"><div class="clean-fill" id="cleanFill"></div></div>
      <span class="clean-pct" id="cleanPct">0%</span>
    </div>
    <div class="clean-list" id="cleanList"></div>
  </div>

  <!-- LOG (lazy) -->
  <div class="view" id="logView" data-view="log">
    <div class="log-input-bar">
      <input class="log-input" id="logInput" placeholder="Log a repair, observation, or note..." aria-label="Log entry">
      <button class="log-add" id="logAdd" aria-label="Add entry">+</button>
    </div>
    <div class="log-list" id="logList"></div>
  </div>

  <!-- BOARD (lazy) -->
  <div class="view" id="boardView" data-view="board">
    <div class="board" id="boardContainer"></div>
  </div>

  <!-- INGEST (admin only, lazy) -->
  <div class="view" id="ingestView" data-view="ingest">
    <div class="ingest-wrap">
      <h2 style="font-size:12px;letter-spacing:2px;color:var(--faint);margin-bottom:14px">KNOWLEDGE INGESTION</h2>
      <textarea id="ingestText" placeholder="Paste email, notes, transcript..." style="width:100%;height:100px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:11px;outline:none;resize:vertical;margin-bottom:8px" aria-label="Text to ingest"></textarea>
      <button id="ingestTextBtn" style="padding:8px 16px;border-radius:6px;border:none;background:var(--accent);color:var(--bg);font-size:11px;font-weight:500;margin-bottom:16px">⚡ Process</button>
      <br>
      <button id="trelloBtn" style="padding:8px 16px;border-radius:6px;border:none;background:var(--blue);color:var(--bg);font-size:11px;font-weight:500">🔄 Smart Trello Import</button>
      <div id="ingestStatus" style="font-size:10px;color:var(--accent);margin-top:10px"></div>
    </div>
  </div>

</main>

<!-- ADMIN MODAL -->
<div class="admin-overlay" id="adminModal">
  <div class="admin-box">
    <h2 style="font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:14px">ADMIN</h2>
    <input type="password" id="adminPass" placeholder="Password" style="width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none;margin-bottom:10px" aria-label="Admin password">
    <div style="display:flex;gap:6px">
      <button id="adminEnter" style="flex:1;padding:8px;border-radius:6px;border:none;background:var(--accent);color:var(--bg);font-size:11px;font-weight:500">Enter</button>
      <button id="adminCancel" style="flex:1;padding:8px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);font-size:11px">Cancel</button>
    </div>
  </div>
</div>

<!-- ORCHESTRATOR -->
<script src="js/app.js"></script>
</body>
</html>
